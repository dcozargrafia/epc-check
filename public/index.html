
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPC Check</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    input, button { width: 100%; padding: 10px; margin: 5px 0; }
    button { background-color: blue; color: white; border: none; cursor: pointer; }
    .resultado { margin-top: 20px; }
    input:disabled { background-color: #e0e0e0; color: #999; cursor: not-allowed; }
  </style>
</head>
<body>
  <h3>Check EPC</h3>

  <input type="text" id="epc" placeholder="e.g. 000103E80000000000FF" maxlength="20" autocomplete="off">
  <button onclick="consultarEPC()">Check</button>
  <div class="resultado" id="resultado"></div>

  <script>

    let bloqueado = false;

    document.getElementById("epc").addEventListener("input", function () {
      if (bloqueado) return;

      const epc = this.value.toUpperCase();
      const hexRegex = /^[0-9A-F]{20}$/;

      if (hexRegex.test(epc)) {
        consultarEPC();
      }
    });

    function calcularDatos(epc) {
      if (!epc || epc.length !== 20) {
        return { error: "EPC inválido" };
      }

      try {
        const dorsalExt = parseInt(epc.substring(4, 8), 16) + (parseInt(epc.substring(16, 18), 16) * 65536);
        const dorsal = parseInt(epc.substring(4, 8), 16);
        const carrera = parseInt(epc.substring(8, 16), 16);
        const empresa = parseInt(epc.substring(0, 4), 16);

        return { epc, dorsalExt, dorsal, empresa, carrera };
      } catch (error) {
        return { error: error.message };
      }
    }

    function consultarEPC() {
      const epcInput = document.getElementById("epc");
      const epc = epcInput.value.toUpperCase();

      if (!epc.trim()) {
        alert("Please enter a valid EPC");
        epcInput.focus();
        return;
      }

      const datos = calcularDatos(epc);
      mostrarResultado(datos);
    }

    function bloquearInput() {
      const epcInput = document.getElementById("epc");
      bloqueado = true;
      epcInput.disabled = true;
      epcInput.placeholder = "Locked...";

      setTimeout(() => {
        bloqueado = false;
        epcInput.disabled = false;
        epcInput.placeholder = "e.g. 000103E80000000000FF";
        epcInput.focus();
      }, 5000);
    }

    function mostrarResultado(datos) {
      let div = document.getElementById("resultado");
      const epcInput = document.getElementById("epc");

      if (datos.error) {
        div.innerHTML = `<p style='color:red;'>${datos.error}</p>`;
      } else {
        div.innerHTML = `
          <p><strong>EPC:</strong> ${datos.epc}</p>
          <p><strong>Code:</strong> ${datos.dorsal}</p>
          <p><strong>Code with Extended Sequencing:</strong> ${datos.dorsalExt}</p>
          <p><strong>Company Code:</strong> ${datos.empresa}</p>
          <p><strong>Race Code:</strong> ${datos.carrera}</p>
        `;
      }

      epcInput.value = "";
      bloquearInput();
    }

    window.onload = function() {
      document.getElementById("epc").focus();
    };
  </script>
</body>
</html>
